<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Games - Unblocked Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="min-h-screen bg-[#f5f5f5] text-[#1a1a1a] selection:bg-emerald-100 selection:text-emerald-900">
    <div id="app">
      <!-- Navigation -->
      <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-black/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div id="logo" class="flex items-center gap-2 cursor-pointer">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
              <i data-lucide="gamepad-2" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">NEXUS<span class="text-emerald-500">GAMES</span></h1>
          </div>

          <div class="relative flex-1 max-w-md">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-black/40"></i>
            <input
              id="search-input"
              type="text"
              placeholder="Search games by title..."
              class="w-full pl-10 pr-10 py-2 bg-black/5 border-none rounded-xl focus:ring-2 focus:ring-emerald-500/20 transition-all outline-none text-sm"
            />
            <button id="clear-search" class="hidden absolute right-3 top-1/2 -translate-y-1/2 p-1 hover:bg-black/5 rounded-full transition-colors">
              <i data-lucide="x" class="w-3 h-3 text-black/40"></i>
            </button>
          </div>
        </div>
      </nav>

      <main class="max-w-7xl mx-auto px-6 py-8">
        <!-- Search Results Header -->
        <div id="search-header" class="hidden mb-6 flex items-center gap-2 text-black/40 text-sm font-medium">
          <i data-lucide="search" class="w-4 h-4"></i>
          <span>Showing results for "<span id="search-term" class="text-black"></span>"</span>
          <span id="results-count" class="ml-auto"></span>
        </div>

        <!-- Categories -->
        <div id="categories-container" class="flex items-center gap-2 overflow-x-auto pb-4 no-scrollbar mb-8">
          <!-- Categories will be injected here -->
        </div>

        <!-- Games Grid -->
        <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          <!-- Games will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-black/40">
          <i data-lucide="layout-grid" class="w-12 h-12 mb-4 opacity-20"></i>
          <p class="text-lg font-medium">No games found matching your search.</p>
        </div>
      </main>

      <!-- Game Player Modal -->
      <div id="game-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 bg-black/80 backdrop-blur-sm">
        <div class="bg-white w-full max-w-6xl h-full max-h-[90vh] rounded-3xl overflow-hidden flex flex-col shadow-2xl">
          <div class="flex items-center justify-between px-6 py-4 border-b border-black/5">
            <div class="flex items-center gap-4">
              <button id="close-modal-btn" class="p-2 hover:bg-black/5 rounded-xl transition-colors">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
              </button>
              <div>
                <h2 id="modal-title" class="font-bold text-lg leading-none mb-1"></h2>
                <p id="modal-category" class="text-xs text-black/40 font-medium uppercase tracking-wider"></p>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <a id="modal-external" href="#" target="_blank" class="p-2 hover:bg-black/5 rounded-xl transition-colors text-black/40 hover:text-black">
                <i data-lucide="external-link" class="w-5 h-5"></i>
              </a>
              <button id="close-modal-x" class="p-2 hover:bg-red-50 hover:text-red-500 rounded-xl transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
          <div class="flex-1 bg-black relative">
            <iframe id="game-iframe" class="w-full h-full border-none" allowfullscreen></iframe>
          </div>
          <div class="px-6 py-4 bg-gray-50 flex items-center justify-between">
            <div class="flex items-center gap-4 text-sm text-black/60">
              <div class="flex items-center gap-1">
                <i data-lucide="maximize-2" class="w-4 h-4"></i>
                <span>Full Screen Supported</span>
              </div>
            </div>
            <div id="modal-id" class="text-xs font-mono text-black/30"></div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="max-w-7xl mx-auto px-6 py-12 border-t border-black/5 mt-12">
        <div class="flex flex-col md:flex-row justify-between items-center gap-8">
          <div class="flex items-center gap-2 opacity-50 grayscale hover:grayscale-0 transition-all cursor-default">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
              <i data-lucide="gamepad-2" class="text-white w-5 h-5"></i>
            </div>
            <span class="font-bold tracking-tight">NEXUSGAMES</span>
          </div>
          <div class="flex gap-8 text-sm font-medium text-black/40">
            <a href="#" class="hover:text-emerald-500 transition-colors">Privacy Policy</a>
            <a href="#" class="hover:text-emerald-500 transition-colors">Terms of Service</a>
            <a href="#" class="hover:text-emerald-500 transition-colors">Contact</a>
          </div>
          <p class="text-sm text-black/30">© 2024 Nexus Games. All rights reserved.</p>
        </div>
      </footer>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./src/main.js"></script>
  </body>
</html>
